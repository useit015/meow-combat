# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Meowtal Kombat Production Game"
  slug: "meowtal-kombat-production"
  kind: specific
  tranche: "Continuous execution: complete successive safe verified slices until the full original outcome is complete."
  status: active
  intake:
    original_request: "Make the Meowtal Kombat concept into a real production-ready and smooth game with proper assets, architecture, effects, and gameplay."
    interpreted_outcome: "A polished, production-ready scoped fighting game where a gray rabbit and ginger/orange tabby cat fight through a complete arcade flow with smooth controls, animations, effects, audio, HUD, and verified game feel."
    input_shape: specific
    audience: "players of the finished scoped game and future maintainers"
    authority: requested
    proof_type: artifact
    completion_proof: "The game runs as a polished production build or production-preview build, passes relevant build/test/lint/smoke/browser checks, and has evidence showing the full scoped game loop: title/start flow, character presentation, fight start, movement, blocking/dashing, combos, specials, super/special meters, HUD/timer/health, pause/options, restart/rematch, K.O./victory, audio, effects, responsive desktop/mobile layout, and no obvious console/runtime/layout/performance failures."
    likely_misfire: "Shipping a flashy proof of concept, asset showcase, or good-enough demo instead of a complete production-ready scoped game with verified combat feel, arcade flow, assets, audio, performance, maintainable architecture, and production build readiness."
    blind_spots_considered:
      - "Visual board selected: local live board in Codex."
      - "Improvement target selected: all of gameplay feel, visual spectacle/assets, and maintainable game architecture."
      - "Success proof selected: polished production-ready scoped game plus production build/preview verification, browser verification, and capture artifact."
      - "Scope selected: full arcade package, not only a single-arena demo."
      - "Use the fresh local GoalBuddy board created for this goal."
      - "Plan challenged on user request: final target is a full polished production-ready scoped game, not an unfinished PoC or demo."
    existing_plan_facts:
      - "Title: Meowtal Kombat."
      - "Original concept says short polished fighting game demo, but owner clarified that the final product must be a full polished production-ready game for the defined scope, not an unfinished PoC."
      - "Arena: bright outdoor stone-paved courtyard with low walls, pillars, trees/bushes, distant cityscape or hills, vibrant lighting, lens flares, particles, and layered parallax depth."
      - "Characters: gray rabbit with hopping, spinning, kicking; ginger/orange tabby cat with pouncing, tail attacks, loaf idle, acrobatic flips."
      - "Need idle, walk, jump, attack, special, hit, knockout, and victory animations."
      - "Effects: hit sparks, energy auras, dust clouds, screen shake, bright particles, damage numbers."
      - "HUD: red rabbit health, blue cat health, portraits, 99 timer, bottom special meters, FIGHT announcement, K.O. finish."
      - "Generate or implement the full production asset pack, including Meowtal Kombat logo/title mark, title/key art, parallax arena layers, HUD frames, health/super/timer treatments, character portraits, buttons/icons, pause/options panels, round/victory/K.O. overlays, damage-number styling, mobile/touch controls, loading/fallback states, particle sprites, and capture/promo artwork as needed."
      - "Controls: movement, jump, light/heavy/special attacks, block, dash, optional gamepad."
      - "Combat: simple 2-3 hit combos, 4-5 unique attacks per character, rabbit tornado special, cat flip kick plus green/yellow projectile or aura blast."
      - "Physics: jumping, knockback, ground bouncing, simple ragdoll-like heavy-hit reactions."
      - "Audio provider readiness checked: Pixabay API key works for official image/video API; ElevenLabs key can generate sound effects via /v1/sound-generation, but read/model endpoints are permission-limited. Do not store secret values in repo."
      - "Current asset quality concern: different animation frames for the same character sometimes look visually inconsistent; production work must normalize or regenerate animations so each fighter has consistent identity, proportions, lighting, scale, camera angle, and rendering style across all moves."
      - "Use repo-local visual references as aspirational art direction: docs/visual-reference/meowtal-kombat/vision-01.png through vision-04.png."
      - "Use canonical original-character sheet prompts before animation generation. Character sheets must include front/side/back/3-4 pose, action pose, relaxed idle, head close-up, expression sheet, detail callouts, size reference, and color swatches for each fighter."
      - "Use Tough Love Arena (https://toughlovearena.com/) as a feel and polish benchmark for smooth web fighting-game responsiveness, readable combat, beautiful presentation, input comfort, and round/rematch flow. Do not copy its characters, art, UI, code, brand, or exact mechanics."
      - "Owner clarified stance consistency: rabbit and cat must not mix two-legged and four-legged normal stance conventions. Current production direction chooses upright two-legged for ordinary stance/movement/attacks; prone or grounded frames are only allowed as clear hit reactions such as knockdown."
      - "Post-completion owner escalation on 2026-05-15: continue beyond the prior final audit until animations feel seamless and character-consistent, UI elements look and function consistently with the original view, and gameplay movement feels less restricted with King of Fighters-style side switching and smoothness."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  no_placeholder_or_unlicensed_assets_at_completion: true
  production_build_required_for_completion: true
  capture_artifact_required_for_completion: true
  console_runtime_layout_performance_failures_block_completion: true
  commit_in_small_batches: true
  character_animation_style_consistency_required: true
  complete_visual_asset_pack_required: true
  parallax_arena_required: true
  canonical_character_sheets_required_before_animation_generation: true
  tough_love_arena_feel_benchmark_required: true
  shared_fighter_stance_convention_required: true

agents:
  scout: installed
  worker: installed
  judge: installed

