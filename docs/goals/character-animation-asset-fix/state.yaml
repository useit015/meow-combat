# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Character Animation Asset Fix"
  slug: "character-animation-asset-fix"
  kind: specific
  tranche: "Stabilize character animation scale and replace blocky-looking project-bound character assets as needed, then verify visually in the running game."
  status: done
  intake:
    original_request: "some animations changes the charcter size like jump and others changes the character looks like block, use imagegen for assets"
    interpreted_outcome: "Character animations keep a consistent visual size across actions such as jump, and blocky-looking character animation/assets are replaced or corrected with imagegen-backed project assets where needed."
    input_shape: specific
    audience: "game player / project owner"
    authority: requested
    proof_type: demo
    completion_proof: "A verified local run or browser demo shows stable character scale across idle/move/jump/other affected animations, no blocky fallback-looking character frames, and any new imagegen assets saved in the workspace and wired into the app."
    likely_misfire: "Generating nicer assets while leaving runtime animation transforms, sprite frame sizing, or state-specific scaling bugs unfixed."
    blind_spots_considered:
      - "Animation size changes may come from transforms, frame dimensions, canvas scaling, CSS, or sprite metadata rather than asset appearance alone."
      - "Blocky character appearance may be placeholder art, low-resolution generated assets, browser image smoothing, fallback rendering, or mismatched asset paths."
      - "Imagegen output must be persisted into the project before code references it."
    existing_plan_facts:
      - "Use the imagegen skill for assets."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/character-animation-asset-fix/"
    command: "npx --yes goalbuddy board '/Users/oussmustaine/Documents/New project/docs/goals/character-animation-asset-fix'"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map the current character animation, rendering, and asset pipeline for size changes and blocky-looking frames."
    inputs:
      - "Project files relevant to character rendering, animation state changes, sprite assets, and verification commands"
      - "Original request from goal intake"
    constraints:
      - "Read-only."
      - "Do not generate images."
      - "Do not edit implementation files."
      - "Identify exact files, asset paths, and commands needed for a bounded fix."
    expected_output:
      - "Relevant rendering and animation files"
      - "Current character asset locations and dimensions if discoverable"
      - "Likely causes of jump/other animation size changes"
      - "Likely causes of blocky-looking character appearance"
      - "Verification commands and visual demo path"
      - "Candidate Worker tasks with allowed_files, verify commands, and stop_if conditions"
    receipt:
      result: done
      summary: "Mapped the Phaser/Vite runtime and asset pipeline. Character sprites render through src/game/MeowtalArenaScene.ts using 256px spritesheet cells, src/game/spriteFrame.ts chooses frames and applies runtime scale/pose motion, and public generated fighter rows already exist for jump and blockstun. Jump rows are dimensionally valid but visually inconsistent: alpha bboxes are much shorter than idle and vary frame-to-frame, so jump appears to resize. Several non-jump motions also deliberately apply scaleX/scaleY changes. Blockstun public rows are not placeholder blocks, but they do vary in silhouette height."
      evidence:
        - "src/game/spriteFrame.ts: FRAME_PLANS and applyMotion define pose scaling; jump currently has no motion branch, while idle/walk/attack/kick/special/down/present alter scale."
        - "src/game/MeowtalArenaScene.ts: renderFighterSprite renders runtime sprites with setScale(1.15 * pose.scaleX, 1.15 * pose.scaleY)."
        - "src/assets/animationMap.ts and src/assets/runtime.ts route combat states to approved public generated sprites or procedural fallback."
        - "public/assets/generated/fighters/gray-rabbit/jump.png is 1536x256 and ginger-tabby-cat/jump.png is 1536x256; both satisfy the 6x256x256 runtime contract."
        - "Alpha bbox analysis: gray-rabbit jump height ranges 138-174px vs idle 234-236px; ginger-tabby-cat jump height ranges 134-179px vs idle 230-232px."
        - "Alpha bbox analysis: gray-rabbit blockstun height ranges 190-238px; ginger-tabby-cat blockstun height ranges 211-238px."
      commands:
        - cmd: "npm test -- --run test/sprite-frame.test.ts test/asset-runtime.test.ts test/animation-map.test.ts"
          status: pass
        - cmd: "npm run imagegen:qa -- --json"
          status: pass
        - cmd: "sips -g pixelWidth -g pixelHeight public/assets/generated/fighters/gray-rabbit/idle.png public/assets/generated/fighters/gray-rabbit/jump.png public/assets/generated/fighters/gray-rabbit/blockstun.png public/assets/generated/fighters/ginger-tabby-cat/idle.png public/assets/generated/fighters/ginger-tabby-cat/jump.png public/assets/generated/fighters/ginger-tabby-cat/blockstun.png"
          status: pass
        - cmd: "Dependency-free PNG alpha bbox analysis for idle/jump/blockstun rows"
          status: pass
      candidate_next_tasks:
        - "Add runtime pose normalization so jump and other active animations keep a stable perceived character height without regenerating assets; cover with sprite-frame tests."
        - "Expose current pose scale in render_game_to_text or visual proof if needed for browser verification."
        - "Only generate replacement imagegen rows if runtime normalization cannot make the existing project-bound imagegen assets acceptable."
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the first safe implementation slice to stabilize character animation scale or unblock asset generation."
    inputs:
      - "T001 receipt"
      - "Goal intake and constraints"
    constraints:
      - "Do not implement."
      - "Prioritize the smallest slice that directly prevents character resizing across animations."
      - "Require project-bound imagegen asset generation only after asset destinations and style constraints are known."
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Deferred tasks, including any imagegen asset task if it is not first"
    receipt:
      result: done
      decision: "Do runtime pose normalization first. The jump sheets are already project-bound imagegen assets with valid 256px runtime cells, but their drawn silhouettes are inconsistent and much shorter than idle. Regenerating rows first is higher risk because exact spritesheet consistency is hard to guarantee, while src/game/spriteFrame.ts already owns the runtime scale/pose adjustments that can stabilize perceived size across actions."
      next_allowed_task: T003
      worker_objective: "Normalize runtime sprite pose scale so jump and other active combat animations keep a stable perceived character size, while preserving animation frame selection and existing project-bound imagegen assets."
      allowed_files:
        - "src/game/spriteFrame.ts"
        - "test/sprite-frame.test.ts"
      verify:
        - "npm test -- --run test/sprite-frame.test.ts"
        - "npm test -- --run test/sprite-frame.test.ts test/asset-runtime.test.ts test/animation-map.test.ts"
        - "npm run typecheck"
      stop_if:
        - "Need to edit asset files or generated PNGs."
        - "Need to change Phaser scene rendering outside spriteFrame pose outputs."
        - "Tests suggest pose normalization would break expected frame selection."
        - "Verification fails twice."
      deferred_tasks:
        - "Use imagegen to create replacement animation rows only if runtime normalization and visual verification still show unacceptable jump/block appearance."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Normalize runtime sprite pose scale so jump and other active combat animations keep a stable perceived character size, while preserving animation frame selection and existing project-bound imagegen assets."
    allowed_files:
      - "src/game/spriteFrame.ts"
      - "test/sprite-frame.test.ts"
    verify:
      - "npm test -- --run test/sprite-frame.test.ts"
      - "npm test -- --run test/sprite-frame.test.ts test/asset-runtime.test.ts test/animation-map.test.ts"
      - "npm run typecheck"
    stop_if:
      - "Need files outside allowed_files."
      - "Character rendering behavior is ambiguous after Scout/Judge evidence."
      - "Need owner approval to replace a recognizable character style."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files:
        - "src/game/spriteFrame.ts"
        - "test/sprite-frame.test.ts"
      commands:
        - cmd: "npm test -- --run test/sprite-frame.test.ts"
          status: pass
        - cmd: "npm test -- --run test/sprite-frame.test.ts test/asset-runtime.test.ts test/animation-map.test.ts"
          status: pass
        - cmd: "npm run typecheck"
          status: pass
      summary: "Removed nonuniform squash/stretch scaling from runtime pose motion, preserved offsets/rotation/frame selection, and added uniform stable frame-scale compensation for compact jump and blockstun frames. Added tests that enforce uniform pose scale, jump frame compensation without frame-selection changes, and stable attack scale while preserving attack motion."
  - id: T004
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: default
    objective: "Generate and integrate imagegen-backed character assets if Scout/Judge determine asset replacement is required."
    allowed_files: []
    verify: []
    stop_if:
      - "Need to use imagegen before exact destination paths, style constraints, and consuming code are known."
      - "Generated assets do not match the required character style or animation frame consistency."
      - "Need files outside allowed_files."
      - "Verification fails twice."
    receipt:
      result: blocked
      summary: "No new raster asset generation is required for this tranche. Existing project-bound imagegen fighter rows are present, approved, and wired into the runtime; the observed jump-size issue was corrected through runtime pose normalization. Imagegen replacement remains deferred only if a future visual review rejects the current generated rows."
      reason: "Conditional asset-generation task is not needed after verified runtime normalization."
      commands:
        - cmd: "Visual check of existing imagegen-backed ?demo=jump and ?demo=blockstun runtime assets in the in-app browser"
          status: pass
  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Run visual verification and polish any remaining character animation size or blockiness issues."
    allowed_files:
      - "src/game/spriteFrame.ts"
      - "test/sprite-frame.test.ts"
      - "docs/goals/character-animation-asset-fix/state.yaml"
    verify:
      - "npm run build"
      - "Browser/in-app or Playwright visual check of ?demo=jump and ?demo=blockstun"
      - "npm test -- --run test/sprite-frame.test.ts test/asset-runtime.test.ts test/animation-map.test.ts"
    stop_if:
      - "No runnable local demo or visual verification route is available."
      - "Need files outside allowed_files."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files:
        - "docs/goals/character-animation-asset-fix/state.yaml"
      commands:
        - cmd: "npm run build"
          status: pass
        - cmd: "In-app browser visual check at http://127.0.0.1:5175/?demo=jump"
          status: pass
        - cmd: "In-app browser visual check at http://127.0.0.1:5175/?demo=blockstun"
          status: pass
        - cmd: "npm test -- --run test/sprite-frame.test.ts test/asset-runtime.test.ts test/animation-map.test.ts"
          status: pass
      summary: "Built the app and visually verified the live canvas demo routes. The jump demo renders the rabbit at a comparable readable size instead of shrinking severely, and blockstun renders the generated fighter art rather than a block/procedural placeholder. No further polish or asset replacement was required for this tranche."
  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the full original character animation and asset outcome is complete."
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current dirty diff"
      - "Visual demo evidence"
    constraints:
      - "Do not implement."
      - "Reject completion if jump or any known affected animation still changes character size."
      - "Reject completion if character still appears as blocky fallback art."
      - "Reject completion if required imagegen assets are not saved inside the workspace and wired into the app."
      - "Reject completion if required Worker work is still queued or active."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "Evidence mapped to original request"
      - "Missing evidence"
      - "Next task if not complete"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "The original outcome is satisfied: runtime pose scaling no longer squashes or stretches characters across active motions, compact jump frames receive uniform scale compensation, existing project-bound imagegen fighter rows remain wired into the app, blockstun renders generated fighter art rather than a block/procedural placeholder, and visual plus automated verification passed."
      evidence:
        - "T001 found jump PNGs were valid project-bound imagegen runtime sheets but had compact/inconsistent silhouettes, while runtime pose code also applied per-animation squash/stretch scaling."
        - "T002 selected runtime pose normalization before asset regeneration because the assets were already present and the smallest safe fix lived in src/game/spriteFrame.ts."
        - "T003 changed src/game/spriteFrame.ts and test/sprite-frame.test.ts to use uniform pose scale, compensate compact jump/blockstun frames, and preserve frame selection plus offsets/rotation."
        - "T004 closed imagegen replacement as not required for this tranche because existing imagegen assets are present, approved, and verified in runtime."
        - "T005 passed npm run build and in-app browser visual checks for http://127.0.0.1:5175/?demo=jump and http://127.0.0.1:5175/?demo=blockstun."
        - "Final verification passed: npm run verify completed typecheck, 26 Vitest files / 175 tests, and production build."
      missing_evidence: []
      spawned_tasks: []

checks:
  dirty_fingerprint: "Before final board commit, git status --short showed only this goal state file modified and unrelated untracked .codex/."
  last_verification:
    result: pass
    task: T999
    commands:
      - "npm run build"
      - "In-app browser visual check at http://127.0.0.1:5175/?demo=jump"
      - "In-app browser visual check at http://127.0.0.1:5175/?demo=blockstun"
      - "npm test -- --run test/sprite-frame.test.ts test/asset-runtime.test.ts test/animation-map.test.ts"
      - "npm run verify"
