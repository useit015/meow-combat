version: 2

goal:
  title: "Moroccan KOF-Style Fighting Game"
  slug: "kof-moroccan-game"
  kind: open_ended
  tranche: "Research source-backed TypeScript/web repo and asset-pipeline options, then build and verify a production-ready combat/input/state foundation before expanding into generated content."
  status: complete
  intake:
    original_request: "the goal is to create a kof style game moroccan themed, lets first dearch the web for any repos that would help"
    interpreted_outcome: "Create a strong production-ready Moroccan-themed KOF-style desktop web game in TypeScript, beginning with web research for useful repositories and asset workflows."
    input_shape: vague
    audience: unknown
    authority: requested
    proof_type: artifact
    completion_proof: "A production-ready TypeScript web engine foundation with strong combat/input/state architecture, clear generated-asset pipeline requirements, and verification that the foundation can support a Moroccan KOF-style game."
    likely_misfire: "The goal could stop at repo research, generic planning, isolated generated art, or decorative theming without producing a production-ready playable fighting game."
    blind_spots_considered:
      - "Visual board preference confirmed: local live board in Codex."
      - "Target quality clarified as strong and production-ready."
      - "First tranche proof clarified as engine foundation before content-heavy output."
      - "Platform clarified as desktop web game in TypeScript."
      - "Online multiplayer and rollback netcode implementation are out of scope for the first tranche."
      - "Architecture should remain compatible with possible future rollback/netcode work."
      - "Image-generated characters and animations requested for execution."
      - "Pet workflow inspiration requested for execution."
      - "Asset licensing posture and OpenAI API-key readiness still need clarification during execution."
    existing_plan_facts:
      - "First execution step should search the web for helpful repositories before implementation."
      - "Execution should use the imagegen workflow to create character and animation assets after requirements are clarified."
      - "Execution should investigate and adapt useful ideas from the relevant pet workflow."
      - "First production tranche should prioritize combat/input/state architecture over early content volume."
      - "First tranche should not implement online multiplayer or rollback netcode, but should avoid blocking future rollback compatibility."
      - "Repo research and implementation should prioritize desktop web and TypeScript-compatible options."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41738/"
    command: "node /Users/oussmustaine/.codex/skills/goalbuddy/extend/local-goal-board/scripts/local-goal-board.mjs --goal '/Users/oussmustaine/Documents/New project/docs/goals/kof-moroccan-game' --port 41738"
