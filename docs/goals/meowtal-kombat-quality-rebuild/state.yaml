      - "Exact Worker objective"
      - "allowed_files"
      - "verify commands"
      - "stop_if conditions"
      - "visual acceptance criteria"
    receipt:
      result: done
      decision: "activate T003 as a focused character-action readability slice"
      rationale: "The Scout evidence shows that character action presentation is the most direct owner-visible quality failure: approved special rows contain broken/occluding frames, and the runtime overlays make captures look noisy. This is higher leverage than a broad HUD or mobile pass because it addresses the specific 'bad quality' signal in the actual fight screen while keeping scope small and locally verifiable."
      worker_objective: "Sanitize special/action frame playback, reduce fight-overlay occlusion, and add fighter grounding shadows/separation so combat screenshots look cleaner and more cohesive without regenerating assets."
      allowed_files:
        - "src/game/MeowtalArenaScene.ts"
        - "src/game/spriteFrame.ts"
        - "test/sprite-frame.test.ts"
      verify:
        - "npm test -- --run test/sprite-frame.test.ts"
        - "npm run typecheck"
        - "npm run build"
        - "PLAYWRIGHT_NODE_MODULES=/tmp/meowtal-playwright/node_modules npm run smoke:meowtal -- --url http://127.0.0.1:4173/ --out-dir output/web-game/meowtal-quality-slice-t003"
      visual_acceptance:
        - "Special/super screenshots no longer use obviously broken cat frames or rabbit frames where the fighter is swallowed by the tornado column."
        - "The FIGHT overlay no longer dominates special/action capture evidence or covers the fighters for an overlong opening beat."
        - "Fighters have visible grounding/contact treatment so they feel placed in the stage rather than pasted on."
        - "No normal gameplay stance convention regression; both fighters remain upright two-legged outside defeat/knockdown contexts."
      stop_if:
        - "Need files outside the allowed list."
        - "Need generated asset edits to make the slice worthwhile."
        - "The change worsens action readability, stance convention, or build health."
