      - "Pick a coherent playable slice, not a tiny helper or pure plan."
      - "Prefer a slice that proves the pet-fighter identity through controls, character presentation, impact, one story/championship beat, visual polish, and audio polish."
      - "Ensure the chosen slice fits the broader target of 8 fighters, keyboard-first browser controls, all core modes, training mode, and touch/mobile v2 extensibility instead of becoming throwaway prototype work."
      - "Reject any asset/animation plan that cannot preserve character consistency across frames."
      - "Define allowed_files, verify commands, and stop conditions."
      - "Set practical scope boundaries from evidence rather than intake assumptions."
      - "Approve dependency or asset-pipeline changes only when evidence shows they are necessary for the selected slice."
      - "Route generated raster image assets through imagegen unless the selected slice clearly requires repo-native vector/code assets."
      - "Approve audio assets only when source/license records are available or the Worker slice includes creating those records before consuming the assets."
