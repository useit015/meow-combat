      - "Identify where generated raster image assets would materially improve production polish/content scale and where repo-native assets would be more appropriate."
      - "Break findings into independent work domains suitable for parallel agents, including files likely owned by each domain."
    expected_output:
      - "Repo/game map"
      - "Run and verification commands"
      - "Current gameplay/content inventory"
      - "Architecture and game-loop feasibility findings"
      - "Keyboard fighting controls and mode feasibility findings"
      - "Asset pipeline and animation consistency recommendations"
      - "Audio source/license workflow recommendations"
      - "Creative bible/data model recommendations"
      - "Verification/performance strategy"
      - "Independent work domains with candidate file ownership"
      - "Candidate next tasks with evidence"
    receipt:
