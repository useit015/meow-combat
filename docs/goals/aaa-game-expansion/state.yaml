# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "AAA Game Expansion"
  slug: "aaa-game-expansion"
  kind: open_ended
  tranche: "Phased AAA-grade milestone program. Tranche 1 proves a polished 2-fighter browser vertical slice standard before scaling toward the 8-fighter full-game direction."
  status: active
  intake:
    original_request: "Make this into a full AAA game with richer characters, scenes, settings, controls, moves, stories, and more."
    interpreted_outcome: "Transform the current project into a polished original browser fighting game: cute pet fighters in a KOF-style championship with funny story, AAA-quality ambition, AI-generated but carefully curated assets, and no slop."
    input_shape: vague
    audience: player and project owner
    authority: requested
    proof_type: demo
    completion_proof: "A playable polished local demo, a concrete content milestone inventory, and a before/after review checklist all show richer visuals, audio, UX, scenes/content, presentation, characters, controls, moves, settings, and story surface."
    likely_misfire: "Producing only a plan, superficial polish, scattered content, or isolated assets instead of cohesive playable improvements."
    blind_spots_considered:
      - "AAA scope must be translated into achievable local milestones."
      - "The first tranche needs evidence from the existing project before implementation."
      - "Success means a polished original fighting game direction: KOF-style fighting structure and impact, Street Fighter/Mortal Kombat gameplay inspiration, and Pokemon-like cute pet character appeal."
      - "The owner selected production polish and content scale as the first major improvement target."
      - "The owner dislikes procedural sounds; audio work should evaluate authored or sample-based programmatic alternatives."
      - "Completion requires all three proof surfaces: playable demo, content milestone, and before/after review checklist."
      - "The owner chose no preselected scope limits; Scout/Judge should inspect first and set evidence-led boundaries."
      - "The owner explicitly requested imagegen for image asset generation."
      - "The owner asked whether Pixabay, ElevenLabs, or similar services can be used for music and SFX; they are candidate sources subject to license verification."
      - "The owner explicitly asked to review and challenge the plan before execution because this should be treated as a real AAA-game effort."
      - "A true AAA game is a production standard, not a single local patch; the first tranche must define a credible milestone strategy and reject shallow substitutions."
      - "Reference games must be treated as inspiration only; the project needs original IP-safe characters, names, moves, story, audio, UI, and assets."
      - "No AI slop is a hard quality bar for every generated image/audio/content asset."
      - "The owner wants about 8 original pet fighters, not only cat and rabbit."
      - "The owner revised controls to keyboard-first for the first browser version; touch/mobile can come in v2."
      - "The owner wants all core modes plus single-player training and brutal/funny tone with funny gore allowed."
      - "The owner approved use of ELEVENLABS_API_KEY and PIXABAY_KEY from .env, including normal quota/credit use."
      - "The owner grants PM/Judge creative freedom for visuals, names, voices, music, and story as long as the final game is good enough."
      - "The owner asked how to speed implementation using multiple agents/subagents and what skills/resources are needed."
      - "The owner forbids glitchy animations, character size drift, weird frame-to-frame appearance changes, inconsistent character identity, and unnatural movement."
      - "The owner wants landscape orientation and quality-first generation/API use."
    existing_plan_facts:
      - "Requested richer characters."
      - "Requested richer scenes and settings."
      - "Requested richer controls and moves."
      - "Requested richer stories."
      - "Genre: KOF-style fighting game with cute pet characters, described as Pokemon meets KOF."
      - "Gameplay references: King of Fighters, Street Fighter, and Mortal Kombat for fighting/gameplay feel."
      - "Character reference: Pokemon for cute pet appeal."
      - "Player fantasy: fighting Pokemon-like pets."
      - "Hard negative: avoid AI slop."
      - "Camera/view: KOF-style fighting presentation."
      - "Main loop: championship with story behind it; moment-to-moment fighting."
      - "Moves: KOF-style attacks that fit each original pet character."
      - "Initial characters: cat and rabbit; PM/Judge may choose funny names."
      - "Roster target: about 8 original cute pet fighters."
      - "World/setting: normal 2026 with a fun twist."
      - "Central conflict: PM/Judge may invent something funny."
      - "Tone: brutal/funny."
      - "Gore/violence: okay when funny, stylized, and tone-appropriate."
      - "First milestone preference: full AAA-game ambition."
      - "Platform: browser now, mobile later."
      - "Controls: keyboard-first for browser v1; touch/mobile can come in v2."
      - "Mobile orientation: landscape."
      - "Modes: all core fighting modes plus single-player training mode; include championship/story mode."
      - "Performance/visual target: visuals should be perfect while maintaining decent performance."
      - "Asset policy: AI-generated assets are acceptable as final assets only if highly polished and not sloppy."
      - "Animation/character consistency policy: never ship glitchy animations, character size drift, weird frame-to-frame appearance changes, inconsistent character identity, or unnatural movement."
      - "Attribution/credits: okay for Pixabay-style assets."
      - "Environment: owner reports ELEVENLABS_API_KEY and PIXABAY_KEY are present in .env and approves using them, including normal quota/credit use."
      - "Generation/API budget posture: quality-first, not cost-conservative."
      - "Visual format: PM/Judge may choose whatever looks best after inspecting repo capabilities and performance constraints."
      - "Voice acting: PM/Judge may choose."
      - "Music vibe: PM/Judge may choose."
      - "Character names and story details: PM/Judge have total creative freedom as long as quality is high."
      - "Acceleration preference: use multiple agents/subagents where safe, especially parallel read-only discovery and disjoint Worker slices."
      - "Initial target preference: production polish and content scale."
      - "Audio preference: avoid procedural sound synthesis as the primary direction."
      - "Scope handling preference: do not pre-limit this tranche; let Scout/Judge decide boundaries after inspecting the project."
      - "Image asset generation preference: use imagegen for generated raster image assets."
      - "Audio source preference: Pixabay, ElevenLabs, or similar services are acceptable candidates if current terms, attribution, plan/tier limits, prohibited uses, and Content ID/platform-claim risks are checked first."
      - "Planning preference: challenge the plan before Scout/Worker execution; do not rush into assets or implementation."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/aaa-game-expansion/"
    command: "npx goalbuddy board docs/goals/aaa-game-expansion"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: T079

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Challenge the AAA-game plan before execution and define the minimum credible production standard for this goal."
    inputs:
      - "Original request"
      - "Diagnostic intake answers"
      - "Current charter and board"
    constraints:
      - "Read-only."
      - "Do not inspect implementation files yet."
      - "Do not generate assets."
      - "Do not implement."
      - "Be skeptical about scope, proof, production risk, and shallow substitutions."
      - "Distinguish a true shipped AAA game from a credible AAA-grade local milestone program."
      - "Treat KOF, Street Fighter, Mortal Kombat, and Pokemon as inspiration only; require original IP-safe characters, names, moves, story, audio, UI, and assets."
      - "Challenge any plan that would produce generic AI-looking assets, inconsistent art direction, or superficial content volume."
      - "Challenge whether an 8-character roster, keyboard-first browser controls, multiple modes, and polished AI-generated assets can be delivered in one tranche; if not, propose a phased plan without diluting the final standard."
      - "Do not allow the full outcome to be marked complete from only a two-character proof unless the owner explicitly accepts a narrower milestone."
      - "Set a character consistency and animation acceptance standard strict enough to prevent AI-looking motion glitches."
      - "Define which domains can be safely parallelized and which must stay sequential because they share architecture, schema, design standards, or verification."
    expected_output:
      - "Top plan risks and likely failure modes"
      - "What AAA must mean for this project before execution proceeds"
      - "Original creative pillars for the cute-pet fighting game"
      - "A credible roster/modes/control phasing strategy for an 8-character keyboard-first browser fighting game with touch/mobile v2 path"
      - "Animation and character consistency acceptance criteria"
      - "Parallelization strategy: Scout domains, Worker domains, unsafe-to-parallelize domains, and needed skills/resources"
      - "Missing owner decisions, if any"
      - "Minimum credible proof package for the first tranche"
      - "Recommended changes to Scout/Judge/Worker sequencing"
      - "Decision: proceed_to_scout | ask_owner | revise_board"
    receipt:
      result: done
      decision: rejected
      routing_decision: revise_board
      full_outcome_complete: false
      note: notes/T001-plan-challenge.md
      summary: "Rejected broad one-tranche execution as likely to produce shallow AI-slop. Required a phased Scout-first plan with Tranche 1 proving a polished 2-fighter browser vertical slice, strict animation consistency, source/license manifests, and verified playable proof before scaling toward 8 fighters and all modes."
      spawned_tasks:
        - T002
        - T003
        - T004
        - T999
  - id: T002
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Run parallel read-only discovery across project architecture, fighting controls, asset pipeline, audio licensing, creative/data model, and verification strategy for Tranche 1."
    inputs:
      - "Project root"
      - "Existing game files"
      - "Existing docs and package manifests"
      - "T001 plan-challenge receipt"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not generate image or audio assets."
      - "Do not use ElevenLabs or Pixabay APIs yet."
      - "Prefer concrete file-path evidence over generic advice."
      - "Use the T001 plan standard to judge the current game honestly."
      - "Parallel read-only Scout agents may inspect independent domains and return receipts to be aggregated by PM."
      - "Identify playable vertical-slice opportunities, not just planning tasks."
      - "Map whether the current project can support KOF-style fighting presentation, character selection, responsive controls, hit reactions, round/championship flow, and browser performance."
      - "Map what is required for an 8-fighter roster, keyboard-first browser controls, landscape layout, championship/story mode, versus/core modes, and single-player training mode."
      - "Identify the safest asset/animation pipeline for consistent character proportions, identity, and natural movement across frames."
      - "Identify non-procedural programmatic audio options such as authored samples, layered stems, adaptive mixes, loops, and event-driven playback."
      - "Evaluate Pixabay, ElevenLabs, and similar services as candidate audio sources, including commercial-use terms, attribution requirements, plan/tier restrictions, and Content ID/platform-claim risks."
